{% extends 'base.html' %}
{% block title %}Grant Miles | 发放里程 — Xinfan Airlines{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5"><div class="card p-4">
<h4 class="mb-3"><span class="lang-zh">发放里程</span><span class="lang-en">Grant Miles</span></h4>
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label"><span class="lang-zh">目标用户名</span><span class="lang-en">Target Username</span></label><input type="text" name="username" class="form-control" required></div>
    <div class="mb-3"><label class="form-label"><span class="lang-zh">里程数</span><span class="lang-en">Amount</span></label><input type="number" name="amount" class="form-control" required></div>
    <div class="mb-3"><label class="form-label"><span class="lang-zh">说明</span><span class="lang-en">Description</span></label><input type="text" name="description" class="form-control" value="{{ '管理员发放'|default:'' }}"></div>
    <button type="submit" class="btn btn-primary w-100"><span class="lang-zh">发放里程</span><span class="lang-en">Grant Miles</span></button>
</form>
</div></div></div>
<a href="{% url 'admin_panel' %}" class="btn btn-outline-secondary mt-3 d-block text-center">← <span class="lang-zh">返回管理后台</span><span class="lang-en">Back to Admin</span></a>{% endblock %}
