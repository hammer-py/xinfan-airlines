{% extends 'base.html' %}
{% block title %}删除航班 — 新帆航空{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5"><div class="card p-4 text-center">
<h4 class="mb-3">确认删除</h4>
<p>确定要删除航班 <strong>{{ flight.flight_number }}</strong>（{{ flight.origin }} → {{ flight.destination }}）吗？此操作不可撤销。</p>
<form method="post">{% csrf_token %}
    <button type="submit" class="btn btn-danger">确认删除</button>
    <a href="{% url 'flight_detail' flight.pk %}" class="btn btn-outline-secondary">取消</a>
</form>
</div></div></div>
{% endblock %}
