{% extends 'base.html' %}
{% block title %}申请私人航班 — 新帆航空{% endblock %}
{% block content %}

<p class="section-label">Private Flight</p>
<h2 class="page-heading">申请私人航班</h2>
<p style="color:var(--text-secondary)">商务舱及以上等级用户可申请私人航班，管理员审批通过后自动排班。</p>

<div class="row justify-content-center"><div class="col-md-8">
<div class="card p-4">
<form method="post">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-sm-6">
            <label class="form-label">航班号 *</label>
            <input type="text" name="flight_number" class="form-control" placeholder="如 XF-P001" required>
        </div>
        <div class="col-sm-6">
            <label class="form-label">机型</label>
            <select name="aircraft" class="form-select">
                <option value="Gulf Stream 650">Gulf Stream 650</option>
                <option value="Airbus 319 ACJ">Airbus 319 ACJ</option>
                <option value="Boeing 787-10">Boeing 787-10</option>
                <option value="Falcon 7x">Falcon 7x</option>
                <option value="KingC90">KingC90</option>
                <option value="PC-12">PC-12</option>
            </select>
        </div>
        <div class="col-sm-6">
            <label class="form-label">出发地 *</label>
            <input type="text" name="origin" class="form-control" value="香港国际机场" required>
        </div>
        <div class="col-sm-6">
            <label class="form-label">目的地 *</label>
            <input type="text" name="destination" class="form-control" required>
        </div>
        <div class="col-sm-6">
            <label class="form-label">计划起飞 *</label>
            <input type="datetime-local" name="departure_time" class="form-control" required>
        </div>
        <div class="col-sm-6">
            <label class="form-label">计划到达 *</label>
            <input type="datetime-local" name="arrival_time" class="form-control" required>
        </div>
        <div class="col-sm-6">
            <label class="form-label">乘客人数</label>
            <input type="number" name="passenger_count" class="form-control" value="1" min="1">
        </div>
        <div class="col-sm-6">
            <label class="form-label">航线类型</label>
            <select name="route_type" class="form-select">
                {% for val, label in route_choices %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-12">
            <label class="form-label">飞行目的 *</label>
            <textarea name="purpose" class="form-control" rows="2" placeholder="请说明申请本次私人航班的目的..." required></textarea>
        </div>
        <div class="col-12">
            <label class="form-label">补充说明</label>
            <textarea name="notes" class="form-control" rows="2" placeholder="其他需要说明的事项（可选）"></textarea>
        </div>
    </div>
    <div class="mt-3">
        <button type="submit" class="btn btn-primary">提交申请</button>
        <a href="{% url 'my_private_requests' %}" class="btn btn-outline-secondary">取消</a>
    </div>
</form>
</div>
</div></div>
{% endblock %}
