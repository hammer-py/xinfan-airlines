{% extends 'base.html' %}
{% block title %}Profile | 编辑资料 — Xinfan Airlines{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
<div class="card p-4">
<h3 class="mb-3"><span class="lang-zh">编辑个人资料</span><span class="lang-en">Edit Profile</span></h3>
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label"><span class="lang-zh">手机号</span><span class="lang-en">Phone</span></label><input type="text" name="phone" class="form-control" value="{{ profile.phone|default:'' }}"></div>
    <div class="mb-3"><label class="form-label"><span class="lang-zh">个人简介</span><span class="lang-en">Bio</span></label><textarea name="bio" class="form-control" rows="3">{{ profile.bio|default:'' }}</textarea></div>
    <button type="submit" class="btn btn-primary"><span class="lang-zh">保存</span><span class="lang-en">Save</span></button>
    <a href="{% url 'profile' %}" class="btn btn-outline-secondary"><span class="lang-zh">取消</span><span class="lang-en">Cancel</span></a>
</form>
</div></div></div>{% endblock %}
