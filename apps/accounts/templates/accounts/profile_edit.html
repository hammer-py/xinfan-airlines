{% extends 'base.html' %}
{% block title %}编辑资料 — 新帆航空{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
<div class="card p-4">
<h3 class="mb-3">编辑个人资料</h3>
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">手机号</label><input type="text" name="phone" class="form-control" value="{{ profile.phone|default:'' }}"></div>
    <div class="mb-3"><label class="form-label">个人简介</label><textarea name="bio" class="form-control" rows="3">{{ profile.bio|default:'' }}</textarea></div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{% url 'profile' %}" class="btn btn-outline-secondary">取消</a>
</form>
</div>
</div></div>
{% endblock %}
