{% extends 'base.html' %}
{% block title %}登录 — 新帆航空{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
<div class="card p-4">
<h3 class="text-center mb-3">登录账户</h3>
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">用户名</label><input type="text" name="username" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">密码</label><input type="password" name="password" class="form-control" required></div>
    <button type="submit" class="btn btn-primary w-100">登录</button>
</form>
<p class="text-center mt-3 mb-0">还没有账户？<a href="{% url 'register' %}">立即注册</a></p>
</div>
</div></div>
{% endblock %}
